<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Pedido confirmado — Milán Matería</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;600;700&family=Cinzel:wght@700;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--gold:#c8a96a;--gold-bright:#e8cb8a;--bg:#080706;--surface:#1e1a14;--border:#332b20;--muted:#9a8870;--green:#4bb98c;}
    body{background:var(--bg);color:#fff;font-family:'Josefin Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px 40px;max-width:540px;width:100%;text-align:center;}
    .check-icon{width:72px;height:72px;background:rgba(75,185,140,.12);border:2px solid var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:32px;}
    .title{font-family:'Cinzel',serif;font-size:26px;font-weight:900;background:linear-gradient(135deg,#f5d98a,#c8a96a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px;}
    .subtitle{color:var(--muted);font-size:14px;margin-bottom:36px;}
    .order-info{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:24px;text-align:left;}
    .order-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;}
    .order-row:last-child{border-bottom:none;}
    .order-row span:first-child{color:var(--muted);}
    .order-row span:last-child{color:#fff;font-weight:600;}
    .items-list{margin:16px 0;text-align:left;}
    .item-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--muted);}
    .item-row:last-child{border-bottom:none;}
    .total-row{display:flex;justify-content:space-between;padding:12px 0;font-size:15px;}
    .total-row span:last-child{font-family:'Cinzel',serif;font-size:18px;background:linear-gradient(135deg,#e8cb8a,#c8a96a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .btn{display:inline-block;padding:13px 28px;background:linear-gradient(135deg,#d4ae6e,#c8a96a,#a07840);color:#080706;border:none;border-radius:8px;font-family:'Josefin Sans',sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:filter .2s;}
    .btn:hover{filter:brightness(1.1);}
    .logo{font-family:'Cinzel',serif;font-size:14px;font-weight:900;background:linear-gradient(135deg,#f5d98a,#c8a96a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:32px;letter-spacing:.06em;}
    .loading{color:var(--muted);font-size:13px;letter-spacing:.08em;text-transform:uppercase;margin:24px 0;}
  </style>
</head>
<body>
  <div class="logo">Milán Matería</div>
  <div class="card" id="card">
    <div class="loading">Verificando pedido...</div>
  </div>

<script>
const API = 'http://localhost:3001';

function fmt(cents) {
  return '$\u202f' + Math.round(cents/100).toLocaleString('es-AR');
}

async function loadOrder() {
  const params = new URLSearchParams(location.search);
  const orderId = params.get('order');
  const card = document.getElementById('card');

  if (!orderId) {
    card.innerHTML = `
      <div class="check-icon">⚠️</div>
      <div class="title">Sin información</div>
      <div class="subtitle">No se encontró el pedido.</div>
      <a class="btn" href="../index.html">Volver a la tienda</a>`;
    return;
  }

  try {
    const order = await fetch(API+'/orders/'+orderId).then(r=>r.json());
    const statusLabel = {pending:'Pendiente',paid:'Confirmado ✓',processing:'En proceso',shipped:'Enviado',delivered:'Entregado',cancelled:'Cancelado'}[order.status]||order.status;

    card.innerHTML = `
      <div class="check-icon">🧉</div>
      <div class="title">¡Gracias por tu compra!</div>
      <div class="subtitle">Tu pedido fue recibido. Te contactaremos por WhatsApp para coordinar el envío.</div>
      <div class="order-info">
        <div class="order-row"><span>N° de pedido</span><span style="font-size:11px">${order.id}</span></div>
        <div class="order-row"><span>Estado</span><span style="color:#4bb98c">${statusLabel}</span></div>
        ${order.customerEmail?`<div class="order-row"><span>Email</span><span>${order.customerEmail}</span></div>`:''}
        <div class="items-list">
          ${(order.items||[]).map(i=>`<div class="item-row"><span>${i.productName} × ${i.quantity}</span><span>${fmt(i.subtotal)}</span></div>`).join('')}
          <div class="total-row"><span>Total pagado</span><span>${fmt(order.total)}</span></div>
        </div>
      </div>
      <a class="btn" href="../index.html">Seguir comprando</a>
    `;
  } catch {
    card.innerHTML = `
      <div class="check-icon">✓</div>
      <div class="title">Pedido recibido</div>
      <div class="subtitle">Tu compra fue procesada correctamente. Te contactaremos a la brevedad.</div>
      <a class="btn" href="../index.html" style="margin-top:8px">Volver a la tienda</a>`;
  }
}

loadOrder();
</script>
</body>
</html>
